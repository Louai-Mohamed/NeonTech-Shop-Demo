<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - NeonTech</title>
    <meta name="description" content="Login to your NeonTech account.">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <span>Neon</span>Tech
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="products.html">Products</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <main style="padding-top: 6rem;">
        <div class="auth-container fade-in">
            <div class="auth-card">
                <h1>Welcome Back</h1>
                <p class="auth-subtitle">Sign in to your NeonTech account</p>

                <form id="signin-form" novalidate>
                    <div class="form-group" id="signin-email-group">
                        <label for="signin-email">Email Address</label>
                        <input 
                            type="email" 
                            id="signin-email" 
                            name="email" 
                            class="form-control" 
                            placeholder="your@email.com"
                            required>
                        <div class="error-message">Email is required.</div>
                    </div>

                    <div class="form-group" id="signin-password-group">
                        <label for="signin-password">Password</label>
                        <input 
                            type="password" 
                            id="signin-password" 
                            name="password" 
                            class="form-control" 
                            placeholder="Enter your password"
                            required>
                        <div class="error-message">Password is required.</div>
                    </div>

                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1.5rem;">Sign In</button>
                </form>

                <p class="auth-link-text">
                    Don't have an account? <a href="register.html">Create one</a>
                </p>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 NeonTech by Louai. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
